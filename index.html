<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpendLog">
<title>SpendLog</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --accent: #7c6aff;
  --accent2: #ff6a6a;
  --accent3: #6affb0;
  --text: #e8e8f0;
  --muted: #6b6b80;
  --danger: #ff4444;
  --success: #44ff88;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  overscroll-behavior: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 15%, rgba(124,106,255,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(106,255,176,0.04) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

/* APP SHELL */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  position: relative;
  z-index: 1;
}

/* STATUS BAR SPACER */
.status-bar {
  height: var(--safe-top);
  background: var(--bg);
  flex-shrink: 0;
}

/* TOP BAR */
.topbar {
  flex-shrink: 0;
  padding: 14px 20px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.9);
  backdrop-filter: blur(20px);
}

.topbar-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.topbar-date {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-top: 1px;
}

.balance-pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  text-align: right;
}

.balance-pill .bp-label {
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.balance-pill .bp-amount {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent3);
  line-height: 1.2;
}

/* SCROLL CONTENT */
.scroll-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding: 16px 16px 20px;
}

/* VIEWS */
.view { display: none; }
.view.active { display: block; }

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
}

.card-accent {
  border-color: var(--accent);
  position: relative;
  overflow: hidden;
}

.card-accent::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
}

/* PROGRESS */
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}

.progress-pct {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
}

.progress-track {
  background: var(--surface2);
  border-radius: 99px;
  height: 5px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  transition: width 0.5s ease;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
}

.progress-meta b { color: var(--text); }

/* SECTION TITLE */
.sec {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin: 18px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sec::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* TODAY CARD */
.today-label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}

.today-title {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 800;
  margin-bottom: 14px;
}

.meal-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.meal-cell {
  background: var(--surface2);
  border-radius: 10px;
  padding: 10px 6px;
  text-align: center;
}

.meal-cell.faded { opacity: 0.45; }

.mc-label {
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
}

.mc-item {
  font-size: 11px;
  color: var(--text);
  line-height: 1.3;
  min-height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mc-cost {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  margin-top: 4px;
}

.transport-row {
  background: var(--surface2);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.tr-label { font-size: 12px; color: var(--muted); }

.tr-amt {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent2);
}

.day-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.dt-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.dt-amount {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--accent2);
}

/* ADD EXPENSE */
.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.field {
  flex: 1;
}

.field label {
  display: block;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
}

input[type=text], input[type=number], select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  padding: 11px 12px;
  outline: none;
  transition: border-color 0.2s;
  appearance: none;
  -webkit-appearance: none;
}

input:focus, select:focus { border-color: var(--accent); }
select option { background: var(--surface2); }

.btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent) 0%, #9b6aff 100%);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 14px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  margin-top: 4px;
}

.btn:active { transform: scale(0.97); opacity: 0.85; }

/* EXPENSE ITEMS */
.exp-list { display: flex; flex-direction: column; gap: 8px; }

.exp-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.ei-left { display: flex; align-items: center; gap: 12px; }

.ei-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

.ei-icon.food { background: rgba(124,106,255,0.15); }
.ei-icon.transport { background: rgba(255,106,106,0.15); }
.ei-icon.other { background: rgba(106,255,176,0.12); }

.ei-name { font-size: 13px; color: var(--text); }
.ei-time { font-size: 10px; color: var(--muted); margin-top: 2px; }

.ei-right { display: flex; align-items: center; gap: 10px; }

.ei-amount {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent2);
}

.btn-del {
  background: none; border: none;
  color: var(--muted); font-size: 16px;
  padding: 4px; cursor: pointer;
  transition: color 0.2s; line-height: 1;
}

.btn-del:active { color: var(--danger); }

/* PLAN LIST */
.plan-list { display: flex; flex-direction: column; gap: 6px; }

.plan-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.2s;
}

.plan-item.is-today { border-color: var(--accent); background: rgba(124,106,255,0.04); }
.plan-item.is-past { opacity: 0.6; }
.plan-item.is-home { opacity: 0.4; }

.pi-left { display: flex; align-items: center; gap: 11px; }

.pi-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); flex-shrink: 0;
}

.pi-dot.past { background: var(--accent3); }
.pi-dot.today { background: var(--accent); box-shadow: 0 0 8px rgba(124,106,255,0.6); }
.pi-dot.home { background: var(--muted); }

.pi-date {
  font-size: 13px; color: var(--text);
}

.pi-sub {
  font-size: 9px; color: var(--muted);
  margin-top: 2px; letter-spacing: 0.5px;
  text-transform: uppercase;
}

.pi-right { text-align: right; }

.pi-amount {
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--text);
}

.pi-bal {
  font-size: 10px; color: var(--muted); margin-top: 2px;
}

.badge-home {
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 8px; color: var(--muted);
}

/* WEEK SEPARATOR */
.week-sep {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent); text-align: center;
  padding: 8px 0 4px;
  border-top: 1px solid rgba(124,106,255,0.2);
  margin-top: 6px;
}

/* EMPTY */
.empty {
  text-align: center; padding: 28px 16px;
  color: var(--muted); font-size: 12px; line-height: 1.8;
}

/* BOTTOM NAV */
.bottom-nav {
  flex-shrink: 0;
  display: flex;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
}

.nav-btn {
  flex: 1; background: none; border: none;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  padding: 12px 8px 14px;
  cursor: pointer; transition: color 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}

.nav-icon { font-size: 20px; line-height: 1; }
.nav-btn.active { color: var(--accent); }
.nav-btn:active { opacity: 0.7; }

/* TOAST */
.toast {
  position: fixed;
  bottom: calc(70px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 9px 18px;
  font-size: 12px; color: var(--accent3);
  opacity: 0; transition: all 0.25s;
  pointer-events: none; white-space: nowrap;
  z-index: 999;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* INSTALL BANNER */
.install-banner {
  background: linear-gradient(135deg, rgba(124,106,255,0.15), rgba(106,255,176,0.08));
  border: 1px solid rgba(124,106,255,0.3);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.ib-text { font-size: 11px; color: var(--text); line-height: 1.5; }
.ib-text span { color: var(--accent); font-weight: 500; }

.ib-btn {
  background: var(--accent);
  border: none; border-radius: 8px;
  color: white; font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700;
  padding: 8px 14px; cursor: pointer;
  white-space: nowrap; flex-shrink: 0;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>
<div class="app">
  <div class="status-bar"></div>

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <div class="topbar-title">SpendLog</div>
      <div class="topbar-date" id="topbar-date"></div>
    </div>
    <div class="balance-pill">
      <div class="bp-label">Balance</div>
      <div class="bp-amount" id="top-balance">—</div>
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-content" id="scroll-content">

    <!-- TODAY VIEW -->
    <div class="view active" id="view-today">

      <div id="install-banner" style="display:none" class="install-banner">
        <div class="ib-text">📲 <span>Install SpendLog</span> on your home screen for quick access</div>
        <button class="ib-btn" onclick="installApp()">Install</button>
      </div>

      <!-- Budget Progress -->
      <div class="card" style="margin-top:4px">
        <div class="progress-header">
          <span class="progress-label">Budget Used</span>
          <span class="progress-pct" id="prog-pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <div class="progress-meta">
          <span>Spent <b id="prog-spent">0</b> LKR</span>
          <span>Of <b>15,886</b> LKR</span>
        </div>
      </div>

      <!-- Today Plan -->
      <div class="sec">Today's Plan</div>
      <div class="card card-accent" id="today-card">
        <div class="today-label">TODAY</div>
        <div class="today-title" id="today-title"></div>
        <div class="meal-grid" id="meal-grid"></div>
        <div class="transport-row" id="transport-row"></div>
        <div class="day-total-row">
          <span class="dt-label">Planned Today</span>
          <span class="dt-amount" id="today-planned">—</span>
        </div>
      </div>

      <!-- Add Expense -->
      <div class="sec">Log Expense</div>
      <div class="card">
        <div class="input-group">
          <div class="field" style="flex:2">
            <label>What</label>
            <input type="text" id="inp-desc" placeholder="e.g. Kola Kanda" autocomplete="off">
          </div>
          <div class="field" style="flex:1">
            <label>LKR</label>
            <input type="number" id="inp-amt" placeholder="0" inputmode="numeric">
          </div>
        </div>
        <div class="input-group">
          <div class="field">
            <label>Category</label>
            <select id="inp-cat">
              <option value="food">🍽️ Food</option>
              <option value="transport">🚌 Transport</option>
              <option value="other">📦 Other</option>
            </select>
          </div>
        </div>
        <button class="btn" onclick="addExpense()">+ Log Expense</button>
      </div>

      <!-- Today's Expenses -->
      <div class="sec">Today's Log</div>
      <div class="exp-list" id="exp-list">
        <div class="empty">Nothing logged yet<br><span style="color:var(--border)">——</span></div>
      </div>
      <div style="height:8px"></div>
    </div>

    <!-- PLAN VIEW -->
    <div class="view" id="view-plan">
      <div style="margin-top:4px"></div>

      <!-- Summary -->
      <div class="card">
        <div class="progress-header">
          <span class="progress-label">Days Remaining</span>
          <span class="progress-pct" id="days-left" style="color:var(--accent3)">—</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="days-fill" style="width:0%;background:linear-gradient(90deg,var(--accent3),var(--accent))"></div>
        </div>
        <div class="progress-meta">
          <span>Mar 4 → Mar 25</span>
          <span>Daily avg <b id="daily-avg">—</b> LKR</span>
        </div>
      </div>

      <div class="sec">Full Schedule</div>
      <div class="plan-list" id="plan-list"></div>
      <div style="height:8px"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="switchView('today')">
      <span class="nav-icon">◎</span>
      Today
    </button>
    <button class="nav-btn" id="nav-plan" onclick="switchView('plan')">
      <span class="nav-icon">▦</span>
      Plan
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

function dayTotal(d) {
  let t = d.bus;
  if (d.bf) t += d.bf.c;
  if (d.ln) t += d.ln.c;
  if (d.dn) t += d.dn.c;
  return t;
}

// ─── STORAGE ──────────────────────────────────────────────────────────
const DB_KEY = 'spendlog_v2';

function load() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || '{}'); } catch { return {}; }
}
function save(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }

function todayKey() { return new Date().toISOString().split('T')[0]; }

function totalActualSpent() {
  const db = load();
  let s = 0;
  Object.values(db).forEach(arr => arr.forEach(e => s += e.amount));
  return s;
}

function actualSpentForDate(dateStr) {
  const db = load();
  return (db[dateStr] || []).reduce((s,e) => s + e.amount, 0);
}

// ─── FORMAT ───────────────────────────────────────────────────────────
function fmt(n) { return Math.round(n).toLocaleString('en-US'); }

const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MON_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtDate(d) {
  return `${DAY_NAMES[d.getDay()]}, ${d.getDate()} ${MON_NAMES[d.getMonth()]}`;
}

// ─── RENDER ───────────────────────────────────────────────────────────
function render() {
  const now = new Date();
  const tk = todayKey();
  const dayData = PLAN.find(d => d.date === tk);
  const totalSpent = totalActualSpent();
  const balance = START_BAL - totalSpent;

  // Topbar
  document.getElementById('topbar-date').textContent = fmtDate(now).toUpperCase();
  document.getElementById('top-balance').textContent = fmt(balance);

  // Progress
  const pct = Math.min(100, Math.round(totalSpent / START_BAL * 100));
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-spent').textContent = fmt(totalSpent);

  // Today card
  if (dayData) {
    const d = new Date(dayData.date + 'T12:00:00');
    document.getElementById('today-title').textContent =
      `${DAY_NAMES[d.getDay()].toUpperCase()}, ${d.getDate()} ${MON_NAMES[d.getMonth()].toUpperCase()}`;

    const mg = document.getElementById('meal-grid');
    if (dayData.home) {
      mg.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;padding:14px">🏠 Home Weekend — No costs</div>`;
    } else if (dayData.note && dayData.note.includes('💑')) {
      mg.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--accent);font-size:15px;padding:14px">${dayData.note}</div>`;
    } else {
      const meals = [
        { lbl:'Breakfast', data: dayData.bf },
        { lbl:'Lunch',     data: dayData.ln },
        { lbl:'Dinner',    data: dayData.dn },
      ];
      mg.innerHTML = meals.map(m => `
        <div class="meal-cell${!m.data ? ' faded' : ''}">
          <div class="mc-label">${m.lbl}</div>
          <div class="mc-item">${m.data ? m.data.n : (m.lbl==='Breakfast'?'🏠 Home':'— skip')}</div>
          <div class="mc-cost">${m.data ? m.data.c+' LKR' : '—'}</div>
        </div>
      `).join('');
    }

    document.getElementById('transport-row').innerHTML = `
      <span class="tr-label">🚌 Bus Fare</span>
      <span class="tr-amt">${dayData.bus > 0 ? fmt(dayData.bus)+' LKR' : '🏠 Home'}</span>
    `;

    document.getElementById('today-planned').textContent = fmt(dayTotal(dayData)) + ' LKR';
  } else {
    document.getElementById('today-title').textContent = 'No plan for today';
    document.getElementById('meal-grid').innerHTML = '';
    document.getElementById('transport-row').innerHTML = '';
    document.getElementById('today-planned').textContent = '—';
  }

  renderExpenses();
  renderPlan(balance);
}

function renderExpenses() {
  const tk = todayKey();
  const db = load();
  const items = db[tk] || [];
  const el = document.getElementById('exp-list');
  const icons = { food:'🍽️', transport:'🚌', other:'📦' };

  if (!items.length) {
    el.innerHTML = '<div class="empty">Nothing logged yet<br><span style="color:var(--border)">——</span></div>';
    return;
  }

  el.innerHTML = items.map((e, i) => `
    <div class="exp-item">
      <div class="ei-left">
        <div class="ei-icon ${e.cat}">${icons[e.cat]||'📦'}</div>
        <div>
          <div class="ei-name">${e.desc}</div>
          <div class="ei-time">${e.time}</div>
        </div>
      </div>
      <div class="ei-right">
        <span class="ei-amount">${fmt(e.amount)} LKR</span>
        <button class="btn-del" onclick="delExpense(${i})">✕</button>
      </div>
    </div>
  `).join('');
}

function renderPlan(currentBal) {
  const tk = todayKey();
  const totalDays = PLAN.length;
  const passedIdx = PLAN.findIndex(d => d.date === tk);
  const daysLeft = totalDays - passedIdx;
  const pct = Math.round((passedIdx / totalDays) * 100);

  document.getElementById('days-left').textContent = daysLeft + ' days';
  document.getElementById('days-fill').style.width = pct + '%';

  // Daily avg of remaining planned spend
  let remPlanned = 0;
  let remDays = 0;
  PLAN.forEach(d => {
    if (d.date >= tk && !d.home) { remPlanned += dayTotal(d); remDays++; }
  });
  document.getElementById('daily-avg').textContent = remDays ? fmt(remPlanned / remDays) : '—';

  // Build plan list
  let runBal = START_BAL;
  // Subtract actual past spending
  PLAN.forEach(d => {
    if (d.date < tk) {
      runBal -= actualSpentForDate(d.date);
    }
  });

  const el = document.getElementById('plan-list');
  let html = '';
  let weekNum = 0;
  const weekStarts = ['2026-03-04','2026-03-09','2026-03-16','2026-03-23'];
  const weekLabels = ['Week 1 — Mar 4–8','Week 2 — Mar 9–15','Week 3 — Mar 16–22','Week 4 — Mar 23–25'];

  PLAN.forEach((d, idx) => {
    const wi = weekStarts.indexOf(d.date);
    if (wi !== -1) {
      html += `<div class="week-sep">${weekLabels[wi]}</div>`;
    }

    const isToday = d.date === tk;
    const isPast = d.date < tk;
    let displaySpent;

    if (isPast) {
      displaySpent = actualSpentForDate(d.date);
      runBal -= displaySpent;
    } else if (isToday) {
      displaySpent = actualSpentForDate(d.date);
      // show running balance after today's actual
      const todayActual = displaySpent;
      runBal = (START_BAL - totalActualSpent());
    } else {
      displaySpent = dayTotal(d);
    }

    const dateObj = new Date(d.date + 'T12:00:00');
    const dateStr = `Mar ${dateObj.getDate()} · ${d.day}`;

    let dotClass = '';
    if (isToday) dotClass = 'today';
    else if (isPast) dotClass = 'past';
    else if (d.home) dotClass = 'home';

    let cls = '';
    if (isToday) cls = 'is-today';
    else if (isPast) cls = 'is-past';
    else if (d.home) cls = 'is-home';

    const subText = d.home ? '🏠 Kandy' : (d.note || (isToday ? '← TODAY' : (isPast ? 'done' : 'planned')));

    // Compute projected balance for future days
    let balDisplay = '';
    if (!isPast && !isToday) {
      let proj = START_BAL - totalActualSpent();
      for (let j = PLAN.findIndex(x => x.date === tk) + 1; j <= idx; j++) {
        proj -= dayTotal(PLAN[j]);
      }
      balDisplay = fmt(proj);
    } else {
      balDisplay = fmt(START_BAL - totalActualSpent() + (isPast ? 0 : 0));
    }

    // Simpler approach: just show projected balance
    let projBal = START_BAL - totalActualSpent();
    const todayIdx = PLAN.findIndex(d2 => d2.date === tk);
    if (!isPast && !isToday && idx > todayIdx) {
      for (let j = todayIdx + 1; j <= idx; j++) {
        projBal -= dayTotal(PLAN[j]);
      }
    }

    html += `
      <div class="plan-item ${cls}">
        <div class="pi-left">
          <div class="pi-dot ${dotClass}"></div>
          <div>
            <div class="pi-date">${dateStr}</div>
            <div class="pi-sub">${subText}</div>
          </div>
        </div>
        <div class="pi-right">
          ${d.home
            ? `<span class="badge-home">Home 🏠</span>`
            : `<div class="pi-amount">${fmt(isToday || isPast ? displaySpent : dayTotal(d))} LKR</div>
               <div class="pi-bal" style="color:${projBal < 2000 ? 'var(--danger)' : 'var(--muted)'}">bal: ${fmt(isToday ? (START_BAL - totalActualSpent()) : projBal)}</div>`
          }
        </div>
      </div>
    `;
  });

  el.innerHTML = html;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────
function addExpense() {
  const desc = document.getElementById('inp-desc').value.trim();
  const amt = parseFloat(document.getElementById('inp-amt').value);
  const cat = document.getElementById('inp-cat').value;
  if (!desc || !amt || amt <= 0) { toast('Enter description & amount'); return; }

  const tk = todayKey();
  const db = load();
  if (!db[tk]) db[tk] = [];
  const now = new Date();
  db[tk].push({
    desc, amount: amt, cat,
    time: now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' })
  });
  save(db);

  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-amt').value = '';
  render();
  toast(`✓ ${fmt(amt)} LKR logged`);
}

function delExpense(i) {
  const tk = todayKey();
  const db = load();
  if (db[tk]) { db[tk].splice(i, 1); save(db); render(); toast('Removed'); }
}

// ─── NAV ──────────────────────────────────────────────────────────────
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
  document.getElementById('scroll-content').scrollTop = 0;
}

// ─── TOAST ────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── PWA INSTALL ──────────────────────────────────────────────────────
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  toast('✓ App installed!');
});

// ─── SERVICE WORKER ───────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── INIT ─────────────────────────────────────────────────────────────
render();
</script>
